# Temporary: verify Gradle Plugin Portal publishing from GitHub Actions.
name: Test Gradle Plugin Portal Publish

on:
  push:
    branches: [test-gradle-plugin-portal-manually]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDKs
        uses: huanshankeji/.github/actions/setup-javas@v0.3.0
        with:
          jdk-versions: 17-temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate Gradle Plugin Portal secrets
        run: |
          set -euo pipefail
          for name in GRADLE_PUBLISH_KEY GRADLE_PUBLISH_SECRET; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing secret::$name is required"
              exit 1
            fi
          done
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

      - name: Publish to Gradle Plugin Portal
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew common-gradle-dependencies:publishPlugins --no-daemon --stacktrace -Pcom.huanshankeji.forceReleaseVersion=true
